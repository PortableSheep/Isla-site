<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Star">
  <title>Star - Thinking</title>
  <defs>
    <style>
      .star-body { fill: #FFD700; stroke: #FFA500; stroke-width: 2; }
      .star-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .star-pupil { fill: #000000; }
      .star-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .star-shine { fill: #FFFF99; }
      .thinking-dot { fill: #FFA500; }
    </style>
  </defs>
  
  <!-- Main star body -->
  <polygon class="star-body" points="100,40 118,95 175,95 131,138 150,193 100,150 50,193 69,138 25,95 82,95"/>
  
  <!-- Left eye thinking -->
  <circle class="star-eye" cx="85" cy="90" r="10"/>
  <circle class="star-pupil" cx="85" cy="85" r="5"/>
  
  <!-- Right eye thinking -->
  <circle class="star-eye" cx="115" cy="90" r="10"/>
  <circle class="star-pupil" cx="115" cy="85" r="5"/>
  
  <!-- Thinking mouth -->
  <path class="star-mouth" d="M 95 115 Q 100 110 105 115"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="140" cy="50" r="5"/>
  <circle class="thinking-dot" cx="160" cy="65" r="3"/>
  
  <!-- Sparkle shine -->
  <circle class="star-shine" cx="70" cy="70" r="4"/>
  <circle class="star-shine" cx="130" cy="65" r="3"/>
</svg>
