<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Surprised Sparkle">
  <title>Sparkle - Surprised</title>
  <defs>
    <style>
      .sparkle-body { fill: #FF69B4; stroke: #FF1493; stroke-width: 2; }
      .sparkle-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .sparkle-pupil { fill: #000000; }
      .sparkle-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .star-shine { fill: #FFD700; }
    </style>
  </defs>
  
  <!-- Star-shaped body bouncing -->
  <polygon class="sparkle-body" points="100,25 115,75 170,75 125,115 145,165 100,125 55,165 75,115 30,75 85,75"/>
  
  <!-- Left eye surprised -->
  <circle class="sparkle-eye" cx="80" cy="72" r="12"/>
  <circle class="sparkle-pupil" cx="80" cy="72" r="7"/>
  
  <!-- Right eye surprised -->
  <circle class="sparkle-eye" cx="120" cy="72" r="12"/>
  <circle class="sparkle-pupil" cx="120" cy="72" r="7"/>
  
  <!-- O-shaped mouth -->
  <circle cx="100" cy="110" r="8" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Large sparkles around -->
  <polygon class="star-shine" points="155,40 159,52 171,52 161,62 165,74 155,62 145,74 149,62 139,52 151,52"/>
  <polygon class="star-shine" points="45,45 49,57 61,57 51,67 55,79 45,67 35,79 39,67 29,57 41,57"/>
  <polygon class="star-shine" points="180,120 184,132 196,132 186,142 190,154 180,142 170,154 174,142 164,132 176,132"/>
  <polygon class="star-shine" points="20,125 24,137 36,137 26,147 30,159 20,147 10,159 14,147 4,137 16,137"/>
  
  <!-- Arm left up -->
  <ellipse class="sparkle-body" cx="35" cy="75" rx="12" ry="40" transform="rotate(-40 35 75)"/>
  
  <!-- Arm right up -->
  <ellipse class="sparkle-body" cx="165" cy="75" rx="12" ry="40" transform="rotate(40 165 75)"/>
</svg>
