<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Boom the powerful creature">
  <title>Boom</title>
  <defs>
    <style>
      .boom-body { fill: #DC143C; stroke: #8B0000; stroke-width: 2; }
      .boom-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .boom-pupil { fill: #000000; }
      .boom-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .boom-power { fill: #FFD700; }
    </style>
  </defs>
  
  <!-- Powerful muscular body -->
  <circle class="boom-body" cx="100" cy="110" r="50"/>
  
  <!-- Pecs -->
  <ellipse fill="#FF6B6B" cx="85" cy="95" rx="12" ry="18"/>
  <ellipse fill="#FF6B6B" cx="115" cy="95" rx="12" ry="18"/>
  
  <!-- Left eye determined -->
  <circle class="boom-eye" cx="85" cy="100" r="10"/>
  <circle class="boom-pupil" cx="85" cy="100" r="5"/>
  
  <!-- Right eye determined -->
  <circle class="boom-eye" cx="115" cy="100" r="10"/>
  <circle class="boom-pupil" cx="115" cy="100" r="5"/>
  
  <!-- Confident smile -->
  <path class="boom-mouth" d="M 90 125 Q 100 135 110 125"/>
  
  <!-- Power lines -->
  <line class="boom-power" x1="50" y1="85" x2="40" y2="75" stroke-width="2" stroke-linecap="round"/>
  <line class="boom-power" x1="150" y1="85" x2="160" y2="75" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Strong left arm -->
  <ellipse class="boom-body" cx="40" cy="125" rx="15" ry="38"/>
  <circle class="boom-body" cx="28" cy="170" r="10"/>
  
  <!-- Strong right arm -->
  <ellipse class="boom-body" cx="160" cy="125" rx="15" ry="38"/>
  <circle class="boom-body" cx="172" cy="170" r="10"/>
  
  <!-- Feet -->
  <ellipse class="boom-body" cx="78" cy="165" rx="16" ry="12"/>
  <ellipse class="boom-body" cx="122" cy="165" rx="16" ry="12"/>
</svg>
