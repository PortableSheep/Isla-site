<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Zing">
  <title>Zing - Happy</title>
  <defs>
    <style>
      .zing-body { fill: #FF4500; stroke: #DC143C; stroke-width: 2; }
      .zing-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .zing-pupil { fill: #000000; }
      .zing-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .zing-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Energetic body bouncing -->
  <circle class="zing-body" cx="100" cy="105" r="50"/>
  
  <!-- Spikes jumping -->
  <polygon class="zing-body" points="100,50 105,30 95,50"/>
  <polygon class="zing-body" points="145,80 165,75 145,90"/>
  <polygon class="zing-body" points="145,130 165,135 145,145"/>
  <polygon class="zing-body" points="55,130 35,135 55,145"/>
  <polygon class="zing-body" points="55,80 35,75 55,90"/>
  
  <!-- Left eye happy -->
  <circle class="zing-eye" cx="85" cy="98" r="11"/>
  <path class="zing-pupil" d="M 78 102 L 92 102 L 92 108 L 78 108 Z"/>
  
  <!-- Right eye happy -->
  <circle class="zing-eye" cx="115" cy="98" r="11"/>
  <path class="zing-pupil" d="M 108 102 L 122 102 L 122 108 L 108 108 Z"/>
  
  <!-- Cheeks -->
  <circle class="zing-cheek" cx="60" cy="105" r="11"/>
  <circle class="zing-cheek" cx="140" cy="105" r="11"/>
  
  <!-- Big excited smile -->
  <path class="zing-mouth" d="M 85 125 Q 100 140 115 125"/>
  
  <!-- Left arm up -->
  <ellipse class="zing-body" cx="40" cy="90" rx="13" ry="38" transform="rotate(-35 40 90)"/>
  <circle class="zing-body" cx="22" cy="75" r="9"/>
  
  <!-- Right arm up -->
  <ellipse class="zing-body" cx="160" cy="90" rx="13" ry="38" transform="rotate(35 160 90)"/>
  <circle class="zing-body" cx="178" cy="75" r="9"/>
  
  <!-- Feet -->
  <ellipse class="zing-body" cx="80" cy="160" rx="16" ry="11"/>
  <ellipse class="zing-body" cx="120" cy="160" rx="16" ry="11"/>
</svg>
