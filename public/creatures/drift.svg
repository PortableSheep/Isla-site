<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drift the dreamy creature">
  <title>Drift</title>
  <defs>
    <style>
      .drift-body { fill: #87CEEB; stroke: #4682B4; stroke-width: 2; }
      .drift-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .drift-pupil { fill: #000000; }
      .drift-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .drift-cloud { fill: #E0F4FF; stroke: #4682B4; stroke-width: 1.5; }
    </style>
  </defs>
  
  <!-- Fluffy cloud-like body -->
  <ellipse class="drift-body" cx="100" cy="115" rx="50" ry="55"/>
  <ellipse class="drift-body" cx="75" cy="105" rx="20" ry="25"/>
  <ellipse class="drift-body" cx="125" cy="105" rx="20" ry="25"/>
  
  <!-- Wispy cloud top -->
  <circle class="drift-cloud" cx="85" cy="65" r="15"/>
  <circle class="drift-cloud" cx="115" cy="65" r="15"/>
  <circle class="drift-cloud" cx="100" cy="55" r="12"/>
  
  <!-- Left eye dreamy -->
  <circle class="drift-eye" cx="85" cy="105" r="11"/>
  <circle class="drift-pupil" cx="85" cy="107" r="5"/>
  
  <!-- Right eye dreamy -->
  <circle class="drift-eye" cx="115" cy="105" r="11"/>
  <circle class="drift-pupil" cx="115" cy="107" r="5"/>
  
  <!-- Dreamy smile -->
  <path class="drift-mouth" d="M 90 130 Q 100 140 110 130"/>
  
  <!-- Left wispy arm -->
  <path class="drift-body" d="M 55 115 Q 35 105 30 125" stroke="#4682B4" stroke-width="3" fill="none"/>
  <circle class="drift-body" cx="25" cy="130" r="8"/>
  
  <!-- Right wispy arm -->
  <path class="drift-body" d="M 145 115 Q 165 105 170 125" stroke="#4682B4" stroke-width="3" fill="none"/>
  <circle class="drift-body" cx="175" cy="130" r="8"/>
  
  <!-- Feet cloud puffs -->
  <ellipse class="drift-cloud" cx="80" cy="175" rx="14" ry="10"/>
  <ellipse class="drift-cloud" cx="120" cy="175" rx="14" ry="10"/>
</svg>
