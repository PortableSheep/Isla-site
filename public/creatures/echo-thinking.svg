<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Echo">
  <title>Echo - Thinking</title>
  <defs>
    <style>
      .echo-body { fill: #FF00FF; stroke: #C71585; stroke-width: 2; }
      .echo-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .echo-pupil { fill: #000000; }
      .echo-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .echo-ring { fill: none; stroke: #FFB6FF; stroke-width: 2; opacity: 0.7; }
      .thinking-dot { fill: #C71585; }
    </style>
  </defs>
  
  <!-- Main body -->
  <circle class="echo-body" cx="100" cy="115" r="48"/>
  
  <!-- Echo rings -->
  <circle class="echo-ring" cx="100" cy="115" r="55"/>
  <circle class="echo-ring" cx="100" cy="115" r="65"/>
  
  <!-- Left eye thinking -->
  <circle class="echo-eye" cx="85" cy="105" r="10"/>
  <circle class="echo-pupil" cx="85" cy="100" r="5"/>
  
  <!-- Right eye thinking -->
  <circle class="echo-eye" cx="115" cy="105" r="10"/>
  <circle class="echo-pupil" cx="115" cy="100" r="5"/>
  
  <!-- Thinking mouth -->
  <path class="echo-mouth" d="M 95 135 Q 100 130 105 135"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="130" cy="55" r="5"/>
  <circle class="thinking-dot" cx="150" cy="70" r="3"/>
  
  <!-- Left arm -->
  <ellipse class="echo-body" cx="40" cy="120" rx="12" ry="36"/>
  <circle class="echo-body" cx="28" cy="165" r="8"/>
  
  <!-- Right arm -->
  <ellipse class="echo-body" cx="160" cy="120" rx="12" ry="36"/>
  <circle class="echo-body" cx="172" cy="165" r="8"/>
  
  <!-- Feet -->
  <ellipse class="echo-body" cx="80" cy="165" rx="15" ry="11"/>
  <ellipse class="echo-body" cx="120" cy="165" rx="15" ry="11"/>
</svg>
