  <circle class="pixel-eye" cx="82" cy="98" r="9.5"/>
  <circle class="pixel-eye" cx="118" cy="98" r="9.5"/>
  <circle class="pixel-pupil" cx="82" cy="99" r="1.8"/>
  <circle class="pixel-pupil" cx="118" cy="99" r="1.8"/>
  <!-- o mouth -->
  <ellipse class="pixel-mouth" cx="100" cy="124" rx="2.5" ry="3.4"/>
  <!-- sweat bead -->
  <path d="M134 80 Q131 86 134 90 Q137 86 134 80 Z" fill="#F5F0E6" stroke="#1A1623" stroke-width="1"/>
