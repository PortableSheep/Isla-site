<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Cozy">
  <title>Cozy - Happy</title>
  <defs>
    <style>
      .cozy-body { fill: #CD853F; stroke: #8B4513; stroke-width: 2; }
      .cozy-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .cozy-pupil { fill: #000000; }
      .cozy-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .cozy-wrap { fill: #DAA520; stroke: #8B4513; stroke-width: 2; }
      .cozy-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Cozy round body wrapped -->
  <circle class="cozy-body" cx="100" cy="110" r="50"/>
  
  <!-- Blanket wrap -->
  <ellipse class="cozy-wrap" cx="100" cy="135" rx="52" ry="35"/>
  <path class="cozy-wrap" d="M 55 105 Q 50 135 70 155 Q 100 175 130 155 Q 150 135 145 105" stroke="#8B4513" stroke-width="2" fill="none"/>
  
  <!-- Small rounded ears -->
  <circle class="cozy-body" cx="70" cy="65" r="12"/>
  <circle class="cozy-body" cx="130" cy="65" r="12"/>
  
  <!-- Left eye happy -->
  <circle class="cozy-eye" cx="85" cy="100" r="11"/>
  <path class="cozy-pupil" d="M 78 104 L 92 104 L 92 110 L 78 110 Z"/>
  
  <!-- Right eye happy -->
  <circle class="cozy-eye" cx="115" cy="100" r="11"/>
  <path class="cozy-pupil" d="M 108 104 L 122 104 L 122 110 L 108 110 Z"/>
  
  <!-- Cheeks -->
  <circle class="cozy-cheek" cx="60" cy="105" r="10"/>
  <circle class="cozy-cheek" cx="140" cy="105" r="10"/>
  
  <!-- Happy smile -->
  <path class="cozy-mouth" d="M 88 125 Q 100 140 112 125"/>
  
  <!-- Arms out of blanket -->
  <circle class="cozy-wrap" cx="40" cy="120" r="10"/>
  <circle class="cozy-wrap" cx="160" cy="120" r="10"/>
</svg>
