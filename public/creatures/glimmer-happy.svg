<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Glimmer">
  <title>Glimmer - Happy</title>
  <defs>
    <style>
      .glimmer-body { fill: #FFD700; stroke: #DAA520; stroke-width: 2; }
      .glimmer-eye { fill: #2C3E50; }
      .glimmer-eye-shine { fill: #FFFFFF; }
      .glimmer-mouth { fill: none; stroke: #8B4513; stroke-width: 2.5; }
      .glimmer-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Main body -->
  <ellipse class="glimmer-body" cx="100" cy="110" rx="55" ry="65"/>
  
  <!-- Left ear -->
  <ellipse class="glimmer-body" cx="70" cy="55" rx="18" ry="32"/>
  <ellipse class="glimmer-eye" cx="70" cy="50" rx="8" ry="10"/>
  
  <!-- Right ear -->
  <ellipse class="glimmer-body" cx="130" cy="55" rx="18" ry="32"/>
  <ellipse class="glimmer-eye" cx="130" cy="50" rx="8" ry="10"/>
  
  <!-- Left eye with happy expression -->
  <circle class="glimmer-eye" cx="80" cy="88" r="12"/>
  <path class="glimmer-eye" d="M 72 95 Q 80 100 88 95"/>
  <circle class="glimmer-eye-shine" cx="82" cy="85" r="5"/>
  
  <!-- Right eye with happy expression -->
  <circle class="glimmer-eye" cx="120" cy="88" r="12"/>
  <path class="glimmer-eye" d="M 112 95 Q 120 100 128 95"/>
  <circle class="glimmer-eye-shine" cx="122" cy="85" r="5"/>
  
  <!-- Cheeks -->
  <circle class="glimmer-cheek" cx="65" cy="110" r="10"/>
  <circle class="glimmer-cheek" cx="135" cy="110" r="10"/>
  
  <!-- Sparkle spots -->
  <circle fill="#FFE4B5" cx="75" cy="115" r="4"/>
  <circle fill="#FFE4B5" cx="125" cy="120" r="4"/>
  <circle fill="#FFE4B5" cx="100" cy="140" r="3"/>
  
  <!-- Big happy mouth -->
  <path class="glimmer-mouth" d="M 90 135 Q 100 148 110 135"/>
  
  <!-- Arms raised in joy -->
  <ellipse class="glimmer-body" cx="50" cy="95" rx="12" ry="35" transform="rotate(-25 50 95)"/>
  <ellipse class="glimmer-body" cx="150" cy="95" rx="12" ry="35" transform="rotate(25 150 95)"/>
  
  <!-- Feet -->
  <ellipse class="glimmer-body" cx="85" cy="175" rx="15" ry="12"/>
  <ellipse class="glimmer-body" cx="115" cy="175" rx="15" ry="12"/>
</svg>
