<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glimmer the moth-lantern guide, happy">
  <title>Glimmer (happy)</title>
  <defs>
    <style>
      .glimmer-body{fill:#4A3A5C;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .lantern{fill:#F5F0E6;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .glimmer-eye{fill:none;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round}
      .glimmer-mouth{fill:#1A1623;stroke:#1A1623;stroke-width:1.5;stroke-linejoin:round}
      .glimmer-accent{fill:#E8B53C;stroke:#1A1623;stroke-width:1;stroke-linejoin:round}
      .shadow{fill:#4A3A5C;opacity:.35}
      .thin{fill:none;stroke:#1A1623;stroke-width:1;stroke-linecap:round}
    </style>
  </defs>
  <path class="shadow" d="M77 44 L131 44 L131 116 L117 128 Q129 152 125 184 Q102 188 82 184 Q79 152 91 128 L77 116 Z"/>
  <path class="glimmer-body" d="M88 122 Q73 148 80 180 Q100 186 121 180 Q127 148 112 122 Z"/>
  <path class="thin" opacity=".4" d="M92 140 Q100 172 112 142"/>
  <path class="thin" stroke-width="1.3" d="M86 134 Q66 146 62 168"/>
  <path class="thin" stroke-width="1.3" d="M114 134 Q136 144 138 172"/>
  <path class="glimmer-body" d="M94 110 L106 110 L105 124 L95 124 Z"/>
  <path class="thin" stroke-width="2" d="M94 28 Q100 17 106 28"/>
  <path class="lantern" d="M87 38 L93 27 L107 27 L113 38 Z"/>
  <path class="lantern" d="M73 42 Q71 40 78 40 L122 40 Q129 40 127 44 L127 108 Q129 114 121 114 L79 114 Q71 114 73 108 Z"/>
  <path class="thin" d="M81 46 L81 108"/>
  <path class="thin" d="M119 46 L119 108"/>
  <!-- brighter flame (happier) -->
  <path class="glimmer-accent" d="M100 48 C89 58 92 70 100 70 C108 70 111 58 100 48 Z"/>
  <path class="glimmer-accent" opacity=".35" d="M100 42 C84 56 86 78 100 78 C114 78 116 56 100 42 Z"/>
  <!-- antenna with lively curl -->
  <path class="thin" stroke-width="1.5" d="M100 27 Q118 8 134 20 Q150 34 146 54"/>
  <circle cx="146" cy="56" r="2.6" fill="#1A1623"/>
  <!-- crescent happy eyes -->
  <path class="glimmer-eye" d="M83 90 Q90 80 97 90"/>
  <path class="glimmer-eye" d="M103 90 Q110 80 117 90"/>
  <!-- stitch X beside left eye -->
  <path class="thin" d="M79 82 L83 86 M83 82 L79 86"/>
  <!-- open grin with bone tooth -->
  <path class="glimmer-mouth" d="M92 100 Q100 112 108 100 Q100 106 92 100 Z"/>
  <path d="M98 100 L102 100 L100 104 Z" fill="#F5F0E6" stroke="#1A1623" stroke-width="0.8"/>
  <circle cx="82" cy="96" r="2.3" fill="#D4A5A5" opacity=".6"/>
  <circle cx="118" cy="96" r="2.3" fill="#D4A5A5" opacity=".6"/>
</svg>
