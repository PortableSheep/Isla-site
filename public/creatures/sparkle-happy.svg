<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sparkle the ghost child, happy">
  <title>Sparkle (happy)</title>
  <defs>
    <style>
      .sparkle-body{fill:#F5F0E6;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .sparkle-eye{fill:none;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round}
      .sparkle-mouth{fill:#1A1623;stroke:#1A1623;stroke-width:1.2;stroke-linejoin:round}
      .sparkle-accent{fill:#D94F8A;stroke:#1A1623;stroke-width:1.5;stroke-linejoin:round}
      .shadow{fill:#4A3A5C;opacity:.35}
      .thin{fill:none;stroke:#1A1623;stroke-width:1;stroke-linecap:round}
      .fold{fill:none;stroke:#B8A4C9;stroke-width:1.5;stroke-linecap:round;opacity:.7}
      .stitch{fill:none;stroke:#1A1623;stroke-width:0.9;stroke-dasharray:1.8 1.8;stroke-linecap:round}
    </style>
  </defs>
  <path class="shadow" d="M60 72 Q50 34 102 32 Q154 34 144 72 L144 158 Q136 186 126 162 Q114 186 102 162 Q90 186 78 162 Q68 186 60 158 Z"/>
  <path class="sparkle-body" d="M58 70 Q46 30 100 28 Q152 30 142 70 L142 158 Q134 188 124 160 Q112 188 100 160 Q88 188 76 160 Q66 188 58 158 Z"/>
  <path class="fold" d="M70 90 Q64 130 74 156"/>
  <path class="fold" d="M130 90 Q136 130 126 156"/>
  <path class="sparkle-accent" d="M100 96 L105 108 L118 109 L108 117 L112 130 L100 122 L88 130 L92 117 L82 109 L95 108 Z"/>
  <path class="stitch" d="M100 96 L105 108 L118 109 L108 117 L112 130 L100 122 L88 130 L92 117 L82 109 L95 108 Z"/>
  <path class="thin" d="M112 130 Q118 140 114 148"/>
  <circle cx="114" cy="149" r="1.2" fill="#1A1623"/>
  <!-- crescent happy eyes -->
  <path class="sparkle-eye" d="M75 72 Q84 60 93 72"/>
  <path class="sparkle-eye" d="M107 72 Q116 60 125 72"/>
  <!-- open grin with tooth -->
  <path class="sparkle-mouth" d="M90 84 Q100 98 110 84 Q100 90 90 84 Z"/>
  <path d="M98 84 L102 84 L100 89 Z" fill="#F5F0E6" stroke="#1A1623" stroke-width="0.8"/>
  <circle cx="72" cy="84" r="3.4" fill="#D4A5A5" opacity=".7"/>
  <circle cx="128" cy="84" r="3.4" fill="#D4A5A5" opacity=".7"/>
</svg>
