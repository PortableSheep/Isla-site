<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Surprised Echo">
  <title>Echo - Surprised</title>
  <defs>
    <style>
      .echo-body { fill: #FF00FF; stroke: #C71585; stroke-width: 2; }
      .echo-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .echo-pupil { fill: #000000; }
      .echo-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .echo-ring { fill: none; stroke: #FFB6FF; stroke-width: 2.5; opacity: 0.8; }
    </style>
  </defs>
  
  <!-- Main body bouncing -->
  <circle class="echo-body" cx="100" cy="105" r="48"/>
  
  <!-- Echo rings burst out -->
  <circle class="echo-ring" cx="100" cy="105" r="58"/>
  <circle class="echo-ring" cx="100" cy="105" r="72"/>
  
  <!-- Left eye surprised -->
  <circle class="echo-eye" cx="85" cy="98" r="12"/>
  <circle class="echo-pupil" cx="85" cy="98" r="7"/>
  
  <!-- Right eye surprised -->
  <circle class="echo-eye" cx="115" cy="98" r="12"/>
  <circle class="echo-pupil" cx="115" cy="98" r="7"/>
  
  <!-- O-shaped mouth -->
  <circle cx="100" cy="130" r="9" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Left arm up -->
  <ellipse class="echo-body" cx="30" cy="90" rx="12" ry="36" transform="rotate(-40 30 90)"/>
  <circle class="echo-body" cx="12" cy="75" r="8"/>
  
  <!-- Right arm up -->
  <ellipse class="echo-body" cx="170" cy="90" rx="12" ry="36" transform="rotate(40 170 90)"/>
  <circle class="echo-body" cx="188" cy="75" r="8"/>
  
  <!-- Feet -->
  <ellipse class="echo-body" cx="80" cy="155" rx="15" ry="11"/>
  <ellipse class="echo-body" cx="120" cy="155" rx="15" ry="11"/>
</svg>
