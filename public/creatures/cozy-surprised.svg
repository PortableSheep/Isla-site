<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cozy the mossy rock creature">
  <title>Cozy</title>
  <!-- palette: bone#F5F0E6 ink#1A1623 dusk#4A3A5C teal-fog#5E8A8C lavender#B8A4C9 blush#D4A5A5 -->
  <defs><style>.cozy-body { fill:#5E8A8C; stroke:#1A1623; stroke-width:2.5;
               stroke-linejoin:round; stroke-linecap:round; }
.cozy-eye { fill:#F5F0E6; stroke:#1A1623; stroke-width:1.5; }
.cozy-pupil { fill:#1A1623; }
.cozy-mouth { fill:none; stroke:#1A1623; stroke-width:2;
                stroke-linecap:round; stroke-linejoin:round; }
.cozy-accent { stroke:#1A1623; stroke-width:1.5;
                 stroke-linecap:round; stroke-linejoin:round; }
.ink { stroke:#1A1623; fill:none; stroke-linecap:round;
        stroke-linejoin:round; }
.shadow { fill:#4A3A5C; opacity:0.35; }
.sketch { stroke:#1A1623; fill:none; opacity:0.4; stroke-width:1;
           stroke-linecap:round; }
.hi { fill:#F5F0E6; }

.cozy-body { fill:#5E8A8C; }
.scarf { fill:#8A6A4A; stroke:#1A1623; stroke-width:1.8;
          stroke-linejoin:round; }
.cap { fill:#8A6A4A; stroke:#1A1623; stroke-width:1.5; }
.stem { fill:#F5F0E6; stroke:#1A1623; stroke-width:1.5; }</style></defs>
  <!-- back shadow -->
  <path class="shadow" d="M56,138 C50,112 62,86 86,84 C104,78 120,78 134,88 C152,94 160,118 156,140 C152,166 132,174 104,176 C74,176 58,164 56,138 Z"/>
  <!-- mushroom stem & cap on top -->
  <path class="stem" d="M96,82 Q95,70 98,64 Q101,62 103,64 Q104,72 104,82 Z"/>
  <path class="cap" d="M84,66 Q92,48 100,48 Q112,49 116,66 Q108,72 100,72 Q90,72 84,66 Z"/>
  <circle cx="95" cy="60" r="1.6" fill="#F5F0E6"/>
  <circle cx="107" cy="62" r="1.2" fill="#F5F0E6"/>
  <!-- body (lumpy rock) -->
  <path class="cozy-body" d="M52,132 C46,106 58,80 84,78 C98,72 116,74 128,82 C148,84 158,110 152,136 C150,164 128,172 100,174 C70,172 54,162 52,132 Z"/>
  <path class="sketch" d="M66,110 Q80,104 92,112"/>
  <path class="sketch" d="M118,96 Q132,100 140,112"/>
  <!-- tiny stubby arms -->
  <path class="ink" stroke-width="2" d="M52,140 Q44,146 46,154"/>
  <path class="ink" stroke-width="2" d="M152,138 Q160,144 158,154"/>
  <!-- scarf around lower head/neck -->
  <path class="scarf" d="M50,138 Q100,148 152,136 Q156,152 150,158 Q100,166 50,156 Q46,146 50,138 Z"/>
  <path class="ink" stroke-width="1" stroke-dasharray="2 2" d="M54,148 Q100,157 148,147"/>
  <path class="ink" stroke-width="1.4" d="M56,158 L55,167"/><path class="ink" stroke-width="1.4" d="M66,158 L67,167"/><path class="ink" stroke-width="1.4" d="M76,158 L75,167"/><path class="ink" stroke-width="1.4" d="M128,158 L129,167"/><path class="ink" stroke-width="1.4" d="M138,158 L137,167"/><path class="ink" stroke-width="1.4" d="M148,158 L149,167"/>
  <circle class="cozy-eye" cx="85" cy="114" r="11"/>
  <circle class="cozy-pupil" cx="85" cy="114" r="2"/>
  <circle class="cozy-eye" cx="115" cy="114" r="11"/>
  <circle class="cozy-pupil" cx="115" cy="114" r="2"/>
  <ellipse cx="100" cy="129" rx="2.2" ry="3" fill="#1A1623"/>
  <g class="ink" stroke-width="1.6"><path d="M92,46 L88,39"/><path d="M100,44 L100,35"/><path d="M108,46 L112,39"/></g>
  <path d="M130,102 Q132,108 134,102 Q132,98 130,102 Z" fill="#F5F0E6" stroke="#1A1623" stroke-width="1"/>
  <circle cx="72" cy="128" r="4" fill="#D4A5A5" opacity="0.6"/>
  <circle cx="128" cy="128" r="4" fill="#D4A5A5" opacity="0.6"/>
</svg>
