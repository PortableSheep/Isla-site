<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Surprised Cozy">
  <title>Cozy - Surprised</title>
  <defs>
    <style>
      .cozy-body { fill: #CD853F; stroke: #8B4513; stroke-width: 2; }
      .cozy-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .cozy-pupil { fill: #000000; }
      .cozy-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .cozy-wrap { fill: #DAA520; stroke: #8B4513; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Body bouncing -->
  <circle class="cozy-body" cx="100" cy="105" r="50"/>
  
  <!-- Blanket unwrapping slightly -->
  <ellipse class="cozy-wrap" cx="100" cy="130" rx="52" ry="35"/>
  <path class="cozy-wrap" d="M 55 100 Q 50 130 70 150 Q 100 170 130 150 Q 150 130 145 100" stroke="#8B4513" stroke-width="2" fill="none"/>
  
  <!-- Ears popping up -->
  <circle class="cozy-body" cx="70" cy="60" r="12"/>
  <circle class="cozy-body" cx="130" cy="60" r="12"/>
  
  <!-- Left eye surprised -->
  <circle class="cozy-eye" cx="85" cy="98" r="12"/>
  <circle class="cozy-pupil" cx="85" cy="98" r="7"/>
  
  <!-- Right eye surprised -->
  <circle class="cozy-eye" cx="115" cy="98" r="12"/>
  <circle class="cozy-pupil" cx="115" cy="98" r="7"/>
  
  <!-- O-shaped mouth -->
  <circle cx="100" cy="125" r="9" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Arms reaching out -->
  <circle class="cozy-wrap" cx="35" cy="115" r="10"/>
  <circle class="cozy-wrap" cx="165" cy="115" r="10"/>
</svg>
