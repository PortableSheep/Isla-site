<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Guardian">
  <title>Guardian - Happy</title>
  <defs>
    <style>
      .guardian-body { fill: #32CD32; stroke: #228B22; stroke-width: 2; }
      .guardian-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .guardian-pupil { fill: #000000; }
      .guardian-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .guardian-shield { fill: #FFD700; stroke: #FFA500; stroke-width: 2; }
      .guardian-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Guardian body -->
  <circle class="guardian-body" cx="100" cy="110" r="48"/>
  
  <!-- Shield on chest -->
  <polygon class="guardian-shield" points="100,90 115,105 100,125 85,105"/>
  
  <!-- Left eye happy -->
  <circle class="guardian-eye" cx="80" cy="100" r="10"/>
  <path class="guardian-pupil" d="M 73 104 L 87 104 L 87 110 L 73 110 Z"/>
  
  <!-- Right eye happy -->
  <circle class="guardian-eye" cx="120" cy="100" r="10"/>
  <path class="guardian-pupil" d="M 113 104 L 127 104 L 127 110 L 113 110 Z"/>
  
  <!-- Cheeks -->
  <circle class="guardian-cheek" cx="60" cy="105" r="10"/>
  <circle class="guardian-cheek" cx="140" cy="105" r="10"/>
  
  <!-- Big happy grin -->
  <path class="guardian-mouth" d="M 88 125 Q 100 140 112 125"/>
  
  <!-- Left arm up in victory -->
  <ellipse class="guardian-body" cx="35" cy="95" rx="13" ry="37" transform="rotate(-30 35 95)"/>
  <circle class="guardian-body" cx="20" cy="80" r="9"/>
  
  <!-- Right arm up in victory -->
  <ellipse class="guardian-body" cx="165" cy="95" rx="13" ry="37" transform="rotate(30 165 95)"/>
  <circle class="guardian-body" cx="180" cy="80" r="9"/>
  
  <!-- Feet -->
  <ellipse class="guardian-body" cx="78" cy="160" rx="16" ry="12"/>
  <ellipse class="guardian-body" cx="122" cy="160" rx="16" ry="12"/>
</svg>
