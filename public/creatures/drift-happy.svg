<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Drift">
  <title>Drift - Happy</title>
  <defs>
    <style>
      .drift-body { fill: #87CEEB; stroke: #4682B4; stroke-width: 2; }
      .drift-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .drift-pupil { fill: #000000; }
      .drift-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .drift-cloud { fill: #E0F4FF; stroke: #4682B4; stroke-width: 1.5; }
      .drift-cheek { fill: #FFB6C1; opacity: 0.5; }
    </style>
  </defs>
  
  <!-- Fluffy body floating -->
  <ellipse class="drift-body" cx="100" cy="110" rx="50" ry="55"/>
  <ellipse class="drift-body" cx="75" cy="100" rx="20" ry="25"/>
  <ellipse class="drift-body" cx="125" cy="100" rx="20" ry="25"/>
  
  <!-- Wispy cloud top -->
  <circle class="drift-cloud" cx="85" cy="60" r="15"/>
  <circle class="drift-cloud" cx="115" cy="60" r="15"/>
  <circle class="drift-cloud" cx="100" cy="50" r="12"/>
  
  <!-- Left eye happy -->
  <circle class="drift-eye" cx="85" cy="100" r="11"/>
  <path class="drift-pupil" d="M 78 104 L 92 104 L 92 110 L 78 110 Z"/>
  
  <!-- Right eye happy -->
  <circle class="drift-eye" cx="115" cy="100" r="11"/>
  <path class="drift-pupil" d="M 108 104 L 122 104 L 122 110 L 108 110 Z"/>
  
  <!-- Cheeks -->
  <circle class="drift-cheek" cx="60" cy="105" r="10"/>
  <circle class="drift-cheek" cx="140" cy="105" r="10"/>
  
  <!-- Happy smile -->
  <path class="drift-mouth" d="M 88 130 Q 100 145 112 130"/>
  
  <!-- Left wispy arm floating up -->
  <path class="drift-body" d="M 55 105 Q 35 85 32 105" stroke="#4682B4" stroke-width="3" fill="none"/>
  <circle class="drift-body" cx="28" cy="108" r="8"/>
  
  <!-- Right wispy arm floating up -->
  <path class="drift-body" d="M 145 105 Q 165 85 168 105" stroke="#4682B4" stroke-width="3" fill="none"/>
  <circle class="drift-body" cx="172" cy="108" r="8"/>
  
  <!-- Feet -->
  <ellipse class="drift-cloud" cx="80" cy="170" rx="14" ry="10"/>
  <ellipse class="drift-cloud" cx="120" cy="170" rx="14" ry="10"/>
</svg>
