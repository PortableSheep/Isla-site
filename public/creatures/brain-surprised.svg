<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Surprised Brain">
  <title>Brain - Surprised</title>
  <defs>
    <style>
      .brain-body { fill: #E6B3FF; stroke: #8B00FF; stroke-width: 2; }
      .brain-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .brain-pupil { fill: #000000; }
      .brain-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .brain-wrinkle { fill: none; stroke: #8B00FF; stroke-width: 1.5; }
    </style>
  </defs>
  
  <!-- Body bouncing -->
  <circle class="brain-body" cx="100" cy="105" r="48"/>
  
  <!-- Brain wrinkles more active -->
  <path class="brain-wrinkle" d="M 80 90 Q 85 85 90 90"/>
  <path class="brain-wrinkle" d="M 85 100 Q 90 95 95 100"/>
  <path class="brain-wrinkle" d="M 110 90 Q 115 85 120 90"/>
  <path class="brain-wrinkle" d="M 105 100 Q 110 95 115 100"/>
  <path class="brain-wrinkle" d="M 90 120 Q 95 115 100 120"/>
  <path class="brain-wrinkle" d="M 100 125 Q 105 120 110 125"/>
  
  <!-- Left eye surprised -->
  <circle class="brain-eye" cx="85" cy="98" r="12"/>
  <circle class="brain-pupil" cx="85" cy="98" r="7"/>
  
  <!-- Right eye surprised -->
  <circle class="brain-eye" cx="115" cy="98" r="12"/>
  <circle class="brain-pupil" cx="115" cy="98" r="7"/>
  
  <!-- O-shaped mouth -->
  <circle cx="100" cy="130" r="9" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Left arm up -->
  <ellipse class="brain-body" cx="35" cy="90" rx="12" ry="35" transform="rotate(-40 35 90)"/>
  <circle class="brain-body" cx="18" cy="75" r="8"/>
  
  <!-- Right arm up -->
  <ellipse class="brain-body" cx="165" cy="90" rx="12" ry="35" transform="rotate(40 165 90)"/>
  <circle class="brain-body" cx="182" cy="75" r="8"/>
  
  <!-- Feet -->
  <ellipse class="brain-body" cx="80" cy="155" rx="15" ry="11"/>
  <ellipse class="brain-body" cx="120" cy="155" rx="15" ry="11"/>
</svg>
