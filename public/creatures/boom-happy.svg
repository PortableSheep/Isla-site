<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Boom">
  <title>Boom - Happy</title>
  <defs>
    <style>
      .boom-body { fill: #DC143C; stroke: #8B0000; stroke-width: 2; }
      .boom-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .boom-pupil { fill: #000000; }
      .boom-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .boom-power { fill: #FFD700; }
      .boom-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Body bouncing -->
  <circle class="boom-body" cx="100" cy="105" r="50"/>
  
  <!-- Pecs -->
  <ellipse fill="#FF6B6B" cx="85" cy="90" rx="12" ry="18"/>
  <ellipse fill="#FF6B6B" cx="115" cy="90" rx="12" ry="18"/>
  
  <!-- Left eye happy -->
  <circle class="boom-eye" cx="85" cy="95" r="10"/>
  <path class="boom-pupil" d="M 78 99 L 92 99 L 92 105 L 78 105 Z"/>
  
  <!-- Right eye happy -->
  <circle class="boom-eye" cx="115" cy="95" r="10"/>
  <path class="boom-pupil" d="M 108 99 L 122 99 L 122 105 L 108 105 Z"/>
  
  <!-- Cheeks -->
  <circle class="boom-cheek" cx="60" cy="100" r="10"/>
  <circle class="boom-cheek" cx="140" cy="100" r="10"/>
  
  <!-- Big happy grin -->
  <path class="boom-mouth" d="M 88 125 Q 100 140 112 125"/>
  
  <!-- Power surges -->
  <line class="boom-power" x1="45" y1="75" x2="35" y2="65" stroke-width="2.5" stroke-linecap="round"/>
  <line class="boom-power" x1="155" y1="75" x2="165" y2="65" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Strong arms raised -->
  <ellipse class="boom-body" cx="35" cy="100" rx="15" ry="38" transform="rotate(-35 35 100)"/>
  <circle class="boom-body" cx="18" cy="85" r="10"/>
  
  <!-- Strong right arm raised -->
  <ellipse class="boom-body" cx="165" cy="100" rx="15" ry="38" transform="rotate(35 165 100)"/>
  <circle class="boom-body" cx="182" cy="85" r="10"/>
  
  <!-- Feet -->
  <ellipse class="boom-body" cx="78" cy="160" rx="16" ry="12"/>
  <ellipse class="boom-body" cx="122" cy="160" rx="16" ry="12"/>
</svg>
