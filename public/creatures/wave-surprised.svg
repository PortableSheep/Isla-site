<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Surprised Wave">
  <title>Wave - Surprised</title>
  <defs>
    <style>
      .wave-body { fill: #1E90FF; stroke: #0047AB; stroke-width: 2; }
      .wave-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .wave-pupil { fill: #000000; }
      .wave-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .wave-ripple { fill: none; stroke: #00CED1; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Wave body bouncing -->
  <circle class="wave-body" cx="100" cy="105" r="48"/>
  
  <!-- Wavy pattern more pronounced -->
  <path class="wave-ripple" d="M 65 100 Q 70 95 75 100 Q 80 105 85 100"/>
  <path class="wave-ripple" d="M 85 120 Q 90 115 95 120 Q 100 125 105 120 Q 110 115 115 120"/>
  <path class="wave-ripple" d="M 115 100 Q 120 95 125 100 Q 130 105 135 100"/>
  
  <!-- Left eye surprised -->
  <circle class="wave-eye" cx="85" cy="98" r="12"/>
  <circle class="wave-pupil" cx="85" cy="98" r="7"/>
  
  <!-- Right eye surprised -->
  <circle class="wave-eye" cx="115" cy="98" r="12"/>
  <circle class="wave-pupil" cx="115" cy="98" r="7"/>
  
  <!-- O-shaped mouth -->
  <circle cx="100" cy="130" r="9" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Left arm waving high -->
  <ellipse class="wave-body" cx="30" cy="90" rx="12" ry="36" transform="rotate(-50 30 90)"/>
  <circle class="wave-body" cx="10" cy="75" r="9"/>
  
  <!-- Right arm up -->
  <ellipse class="wave-body" cx="165" cy="95" rx="12" ry="36" transform="rotate(40 165 95)"/>
  <circle class="wave-body" cx="180" cy="75" r="9"/>
  
  <!-- Feet -->
  <ellipse class="wave-body" cx="80" cy="155" rx="15" ry="11"/>
  <ellipse class="wave-body" cx="120" cy="155" rx="15" ry="11"/>
</svg>
