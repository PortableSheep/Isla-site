<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Pixel">
  <title>Pixel - Thinking</title>
  <defs>
    <style>
      .pixel-body { fill: #00CED1; stroke: #008B8B; stroke-width: 2; }
      .pixel-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .pixel-pupil { fill: #000000; }
      .pixel-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .thinking-dot { fill: #000000; }
    </style>
  </defs>
  
  <!-- Cubic body tilted thinking -->
  <rect class="pixel-body" x="60" y="70" width="80" height="80" rx="4"/>
  
  <!-- Left eye thinking (looking up) -->
  <rect class="pixel-eye" x="70" y="85" width="20" height="20" rx="2"/>
  <rect class="pixel-pupil" x="76" y="88" width="8" height="6"/>
  
  <!-- Right eye thinking (looking up) -->
  <rect class="pixel-eye" x="110" y="85" width="20" height="20" rx="2"/>
  <rect class="pixel-pupil" x="116" y="88" width="8" height="6"/>
  
  <!-- Antenna left -->
  <line x1="75" y1="70" x2="75" y2="40" stroke="#008B8B" stroke-width="3" stroke-linecap="round"/>
  <circle fill="#00CED1" cx="75" cy="35" r="5"/>
  
  <!-- Antenna right (tilted) -->
  <line x1="125" y1="70" x2="135" y2="35" stroke="#008B8B" stroke-width="3" stroke-linecap="round"/>
  <circle fill="#00CED1" cx="138" cy="32" r="5"/>
  
  <!-- Neutral/thinking mouth -->
  <line x1="80" y1="130" x2="120" y2="130" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="135" cy="50" r="5"/>
  <circle class="thinking-dot" cx="155" cy="65" r="3"/>
  
  <!-- Left arm scratching head -->
  <rect class="pixel-body" x="45" y="85" width="15" height="50" rx="2"/>
  <circle fill="#00CED1" cx="52" cy="75" r="8"/>
  
  <!-- Right arm -->
  <rect class="pixel-body" x="140" y="105" width="15" height="50" rx="2"/>
  <circle fill="#00CED1" cx="147" cy="160" r="8"/>
  
  <!-- Left foot -->
  <rect class="pixel-body" x="65" y="155" width="20" height="25" rx="2"/>
  
  <!-- Right foot -->
  <rect class="pixel-body" x="115" y="155" width="20" height="25" rx="2"/>
</svg>
