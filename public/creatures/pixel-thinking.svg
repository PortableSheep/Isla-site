<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pixel the patchwork parent, thinking">
  <title>Pixel (thinking)</title>
  <defs>
    <style>
      .pixel-body{fill:#4A3A5C;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .muzzle{fill:#F5F0E6;stroke:#1A1623;stroke-width:1.5;stroke-linejoin:round}
      .pixel-eye{fill:#F5F0E6;stroke:#1A1623;stroke-width:1.5}
      .pixel-pupil{fill:#1A1623}
      .pixel-mouth{fill:none;stroke:#1A1623;stroke-width:1.5;stroke-linecap:round}
      .pixel-accent{fill:#4A7C7E;stroke:#1A1623;stroke-width:1.5;stroke-linejoin:round}
      .shadow{fill:#4A3A5C;opacity:.35}
      .thin{fill:none;stroke:#1A1623;stroke-width:1;stroke-linecap:round}
      .seam{fill:none;stroke:#1A1623;stroke-width:1.3;stroke-dasharray:3 3;stroke-linecap:round}
      .patch{fill:#B8A4C9;stroke:#1A1623;stroke-width:1.2;stroke-dasharray:2.5 2.5;stroke-linejoin:round}
    </style>
  </defs>
  <path class="shadow" d="M56 62 L148 62 L152 184 L50 184 Z"/>
  <path class="pixel-body" d="M60 56 L73 28 L86 56 Z"/>
  <path class="thin" d="M66 48 L78 44"/>
  <path class="pixel-body" d="M114 56 Q128 26 142 56 Z"/>
  <path class="thin" d="M124 42 Q128 38 132 42"/>
  <path class="pixel-body" d="M52 62 Q50 56 58 56 L142 56 Q150 56 148 62 L150 174 Q152 182 144 182 L56 182 Q48 182 50 174 Z"/>
  <path class="pixel-body" d="M50 102 Q36 122 46 146 Q56 146 56 122 Z"/>
  <path class="pixel-body" d="M150 104 Q166 124 154 148 Q144 148 144 124 Z"/>
  <path class="seam" d="M100 60 L100 182"/>
  <path class="thin" d="M96 90 L104 90 M96 130 L104 130 M96 160 L104 160"/>
  <path class="patch" d="M112 140 L136 142 L134 164 L110 160 Z"/>
  <path class="pixel-accent" d="M82 76 L96 84 L82 92 Z"/>
  <path class="pixel-accent" d="M118 76 L104 84 L118 92 Z"/>
  <path class="pixel-accent" d="M96 80 L104 80 L104 88 L96 88 Z"/>
  <path class="muzzle" d="M82 116 Q80 112 86 110 L114 110 Q120 112 118 116 L116 128 Q100 132 84 128 Z"/>
  <path d="M96 116 L104 116 L100 122 Z" fill="#1A1623"/>
  <!-- thought dots -->
  <circle cx="150" cy="34" r="1.6" fill="#1A1623"/>
  <circle cx="158" cy="24" r="2" fill="#1A1623"/>
  <circle cx="166" cy="14" r="2.4" fill="#1A1623"/>
  <!-- right saucer eye, left spiral/half-closed -->
  <circle class="pixel-eye" cx="82" cy="98" r="7.5"/>
  <circle cx="82" cy="98" r="5" fill="none" stroke="#1A1623" stroke-width="1.3"/>
  <circle cx="82" cy="98" r="2.2" fill="none" stroke="#1A1623" stroke-width="1.3"/>
  <circle class="pixel-eye" cx="118" cy="98" r="7.5"/>
  <circle class="pixel-pupil" cx="118" cy="99" r="5"/>
  <circle cx="116" cy="96" r="1.4" fill="#F5F0E6"/>
  <!-- furrowed brows -->
  <path class="thin" stroke-width="1.5" d="M74 86 Q82 83 90 87"/>
  <path class="thin" stroke-width="1.5" d="M110 87 Q118 83 126 86"/>
  <!-- tight mouth -->
  <path class="pixel-mouth" d="M92 125 Q100 127 108 125"/>
  <circle cx="72" cy="114" r="3" fill="#D4A5A5" opacity=".45"/>
  <circle cx="128" cy="114" r="3" fill="#D4A5A5" opacity=".45"/>
</svg>
