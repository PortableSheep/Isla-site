<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Wave">
  <title>Wave - Happy</title>
  <defs>
    <style>
      .wave-body { fill: #1E90FF; stroke: #0047AB; stroke-width: 2; }
      .wave-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .wave-pupil { fill: #000000; }
      .wave-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .wave-ripple { fill: none; stroke: #00CED1; stroke-width: 2; }
      .wave-cheek { fill: #FFB6C1; opacity: 0.5; }
    </style>
  </defs>
  
  <!-- Wave body bouncing -->
  <circle class="wave-body" cx="100" cy="110" r="48"/>
  
  <!-- Wavy pattern -->
  <path class="wave-ripple" d="M 65 105 Q 70 100 75 105 Q 80 110 85 105"/>
  <path class="wave-ripple" d="M 85 125 Q 90 120 95 125 Q 100 130 105 125 Q 110 120 115 125"/>
  <path class="wave-ripple" d="M 115 105 Q 120 100 125 105 Q 130 110 135 105"/>
  
  <!-- Left eye happy -->
  <circle class="wave-eye" cx="85" cy="100" r="10"/>
  <path class="wave-pupil" d="M 78 104 L 92 104 L 92 110 L 78 110 Z"/>
  
  <!-- Right eye happy -->
  <circle class="wave-eye" cx="115" cy="100" r="10"/>
  <path class="wave-pupil" d="M 108 104 L 122 104 L 122 110 L 108 110 Z"/>
  
  <!-- Cheeks -->
  <circle class="wave-cheek" cx="60" cy="105" r="10"/>
  <circle class="wave-cheek" cx="140" cy="105" r="10"/>
  
  <!-- Happy smile -->
  <path class="wave-mouth" d="M 88 125 Q 100 140 112 125"/>
  
  <!-- Left arm waving enthusiastically -->
  <ellipse class="wave-body" cx="35" cy="95" rx="12" ry="36" transform="rotate(-40 35 95)"/>
  <circle class="wave-body" cx="18" cy="80" r="9"/>
  
  <!-- Right arm up -->
  <ellipse class="wave-body" cx="160" cy="100" rx="12" ry="36" transform="rotate(30 160 100)"/>
  <circle class="wave-body" cx="175" cy="85" r="9"/>
  
  <!-- Feet -->
  <ellipse class="wave-body" cx="80" cy="160" rx="15" ry="11"/>
  <ellipse class="wave-body" cx="120" cy="160" rx="15" ry="11"/>
</svg>
