<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Surprised Boom">
  <title>Boom - Surprised</title>
  <defs>
    <style>
      .boom-body { fill: #DC143C; stroke: #8B0000; stroke-width: 2; }
      .boom-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .boom-pupil { fill: #000000; }
      .boom-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .boom-power { fill: #FFD700; }
    </style>
  </defs>
  
  <!-- Body bouncing with energy -->
  <circle class="boom-body" cx="100" cy="100" r="50"/>
  
  <!-- Pecs tensed -->
  <ellipse fill="#FF6B6B" cx="85" cy="85" rx="12" ry="18"/>
  <ellipse fill="#FF6B6B" cx="115" cy="85" rx="12" ry="18"/>
  
  <!-- Left eye surprised wide -->
  <circle class="boom-eye" cx="85" cy="95" r="12"/>
  <circle class="boom-pupil" cx="85" cy="95" r="7"/>
  
  <!-- Right eye surprised wide -->
  <circle class="boom-eye" cx="115" cy="95" r="12"/>
  <circle class="boom-pupil" cx="115" cy="95" r="7"/>
  
  <!-- O-shaped mouth -->
  <circle cx="100" cy="130" r="9" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Explosive power lines -->
  <line class="boom-power" x1="40" y1="70" x2="25" y2="55" stroke-width="3" stroke-linecap="round"/>
  <line class="boom-power" x1="160" y1="70" x2="175" y2="55" stroke-width="3" stroke-linecap="round"/>
  <line class="boom-power" x1="50" y1="130" x2="35" y2="145" stroke-width="2" stroke-linecap="round"/>
  <line class="boom-power" x1="150" y1="130" x2="165" y2="145" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Strong arms up -->
  <ellipse class="boom-body" cx="30" cy="95" rx="15" ry="38" transform="rotate(-40 30 95)"/>
  <circle class="boom-body" cx="12" cy="80" r="10"/>
  
  <!-- Strong right arm up -->
  <ellipse class="boom-body" cx="170" cy="95" rx="15" ry="38" transform="rotate(40 170 95)"/>
  <circle class="boom-body" cx="188" cy="80" r="10"/>
  
  <!-- Feet -->
  <ellipse class="boom-body" cx="78" cy="155" rx="16" ry="12"/>
  <ellipse class="boom-body" cx="122" cy="155" rx="16" ry="12"/>
</svg>
