<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glimmer the moth-lantern guide, surprised">
  <title>Glimmer (surprised)</title>
  <defs>
    <style>
      .glimmer-body{fill:#4A3A5C;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .lantern{fill:#F5F0E6;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .glimmer-eye{fill:#F5F0E6;stroke:#1A1623;stroke-width:1.5}
      .glimmer-pupil{fill:#1A1623}
      .glimmer-mouth{fill:#1A1623;stroke:#1A1623;stroke-width:1}
      .glimmer-accent{fill:#E8B53C;stroke:#1A1623;stroke-width:1;stroke-linejoin:round}
      .shadow{fill:#4A3A5C;opacity:.35}
      .thin{fill:none;stroke:#1A1623;stroke-width:1;stroke-linecap:round}
    </style>
  </defs>
  <path class="shadow" d="M77 44 L131 44 L131 116 L117 128 Q129 152 125 184 Q102 188 82 184 Q79 152 91 128 L77 116 Z"/>
  <path class="glimmer-body" d="M88 122 Q73 148 80 180 Q100 186 121 180 Q127 148 112 122 Z"/>
  <path class="thin" opacity=".4" d="M92 140 Q100 172 112 142"/>
  <path class="thin" stroke-width="1.3" d="M86 134 Q64 146 60 168"/>
  <path class="thin" stroke-width="1.3" d="M114 134 Q138 144 140 170"/>
  <path class="glimmer-body" d="M94 110 L106 110 L105 124 L95 124 Z"/>
  <path class="thin" stroke-width="2" d="M94 28 Q100 17 106 28"/>
  <path class="lantern" d="M87 38 L93 27 L107 27 L113 38 Z"/>
  <path class="lantern" d="M73 42 Q71 40 78 40 L122 40 Q129 40 127 44 L127 108 Q129 114 121 114 L79 114 Q71 114 73 108 Z"/>
  <path class="thin" d="M81 46 L81 108"/>
  <path class="thin" d="M119 46 L119 108"/>
  <!-- flame flickers tall (startled) -->
  <path class="glimmer-accent" d="M100 46 C88 58 92 70 100 70 C108 70 112 58 100 46 Z"/>
  <path class="glimmer-accent" opacity=".4" d="M100 40 C82 56 84 80 100 80 C116 80 118 56 100 40 Z"/>
  <!-- antenna sprung up -->
  <path class="thin" stroke-width="1.5" d="M100 27 Q108 6 128 10 Q152 16 154 44"/>
  <circle cx="154" cy="46" r="2.6" fill="#1A1623"/>
  <!-- 3 hair-spike startle lines above lantern -->
  <path class="thin" stroke-width="1.5" d="M82 34 L76 24"/>
  <path class="thin" stroke-width="1.5" d="M68 44 L58 40"/>
  <path class="thin" stroke-width="1.5" d="M70 54 L60 58"/>
  <!-- huge sclera, tiny pupils -->
  <circle class="glimmer-eye" cx="89" cy="86" r="9"/>
  <circle class="glimmer-eye" cx="111" cy="86" r="9"/>
  <circle class="glimmer-pupil" cx="89" cy="87" r="1.8"/>
  <circle class="glimmer-pupil" cx="111" cy="87" r="1.8"/>
  <!-- stitch X beside left -->
  <path class="thin" d="M76 76 L80 80 M80 76 L76 80"/>
  <!-- small o mouth -->
  <ellipse class="glimmer-mouth" cx="100" cy="104" rx="2.2" ry="3"/>
</svg>
