<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Surprised Wobbly">
  <title>Wobbly - Surprised</title>
  <defs>
    <style>
      .wobbly-body { fill: #9B59B6; stroke: #6C3483; stroke-width: 2; }
      .wobbly-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .wobbly-pupil { fill: #000000; }
      .wobbly-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
    </style>
  </defs>
  
  <!-- Wobbly main body bouncing -->
  <ellipse class="wobbly-body" cx="100" cy="105" rx="48" ry="60"/>
  
  <!-- Wobbly bumps jigging -->
  <circle class="wobbly-body" cx="70" cy="65" r="12"/>
  <circle class="wobbly-body" cx="130" cy="65" r="12"/>
  <circle class="wobbly-body" cx="60" cy="130" r="10"/>
  <circle class="wobbly-body" cx="140" cy="135" r="10"/>
  
  <!-- Left eye surprised -->
  <circle class="wobbly-eye" cx="85" cy="95" r="13"/>
  <circle class="wobbly-pupil" cx="85" cy="95" r="7"/>
  
  <!-- Right eye surprised -->
  <circle class="wobbly-eye" cx="115" cy="95" r="13"/>
  <circle class="wobbly-pupil" cx="115" cy="95" r="7"/>
  
  <!-- O-shaped mouth -->
  <circle cx="100" cy="130" r="9" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Left arm up wobbling -->
  <path class="wobbly-body" d="M 55 105 Q 30 85 28 105 Q 35 130 48 145" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <circle class="wobbly-body" cx="22" cy="100" r="9"/>
  
  <!-- Right arm up wobbling -->
  <path class="wobbly-body" d="M 145 105 Q 170 85 172 105 Q 165 130 152 145" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <circle class="wobbly-body" cx="178" cy="100" r="9"/>
  
  <!-- Feet -->
  <ellipse class="wobbly-body" cx="80" cy="165" rx="16" ry="12"/>
  <ellipse class="wobbly-body" cx="120" cy="165" rx="16" ry="12"/>
</svg>
