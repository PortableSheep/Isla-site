<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Cheery">
  <title>Cheery - Happy</title>
  <defs>
    <style>
      .cheery-body { fill: #FFA500; stroke: #FF8C00; stroke-width: 2; }
      .cheery-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .cheery-pupil { fill: #000000; }
      .cheery-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .cheery-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Main round body bouncing -->
  <circle class="cheery-body" cx="100" cy="105" r="55"/>
  
  <!-- Small ear bumps -->
  <circle class="cheery-body" cx="65" cy="60" r="15"/>
  <circle class="cheery-body" cx="135" cy="60" r="15"/>
  
  <!-- Left eye happy -->
  <circle class="cheery-eye" cx="85" cy="98" r="12"/>
  <path class="cheery-pupil" d="M 78 102 L 92 102 L 92 108 L 78 108 Z"/>
  
  <!-- Right eye happy -->
  <circle class="cheery-eye" cx="115" cy="98" r="12"/>
  <path class="cheery-pupil" d="M 108 102 L 122 102 L 122 108 L 108 108 Z"/>
  
  <!-- Cheeks -->
  <circle class="cheery-cheek" cx="60" cy="105" r="11"/>
  <circle class="cheery-cheek" cx="140" cy="105" r="11"/>
  
  <!-- Big happy smile -->
  <path class="cheery-mouth" d="M 85 130 Q 100 148 115 130"/>
  
  <!-- Dots -->
  <circle fill="#FFD700" cx="75" cy="90" r="3"/>
  <circle fill="#FFD700" cx="125" cy="100" r="3"/>
  <circle fill="#FFD700" cx="100" cy="150" r="3"/>
  
  <!-- Left arm raised -->
  <ellipse class="cheery-body" cx="40" cy="95" rx="13" ry="40" transform="rotate(-30 40 95)"/>
  <circle class="cheery-body" cx="25" cy="80" r="8"/>
  
  <!-- Right arm raised -->
  <ellipse class="cheery-body" cx="160" cy="95" rx="13" ry="40" transform="rotate(30 160 95)"/>
  <circle class="cheery-body" cx="175" cy="80" r="8"/>
  
  <!-- Feet -->
  <ellipse class="cheery-body" cx="80" cy="165" rx="18" ry="10"/>
  <ellipse class="cheery-body" cx="120" cy="165" rx="18" ry="10"/>
</svg>
