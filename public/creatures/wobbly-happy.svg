<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Wobbly">
  <title>Wobbly - Happy</title>
  <defs>
    <style>
      .wobbly-body { fill: #9B59B6; stroke: #6C3483; stroke-width: 2; }
      .wobbly-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .wobbly-pupil { fill: #000000; }
      .wobbly-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .wobbly-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Wobbly main body bouncing -->
  <ellipse class="wobbly-body" cx="100" cy="110" rx="48" ry="60"/>
  
  <!-- Wobbly bumps/wobbles -->
  <circle class="wobbly-body" cx="70" cy="70" r="12"/>
  <circle class="wobbly-body" cx="130" cy="70" r="12"/>
  <circle class="wobbly-body" cx="60" cy="135" r="10"/>
  <circle class="wobbly-body" cx="140" cy="140" r="10"/>
  
  <!-- Left eye happy -->
  <circle class="wobbly-eye" cx="85" cy="100" r="11"/>
  <path class="wobbly-pupil" d="M 78 105 L 92 105 L 92 112 L 78 112 Z"/>
  
  <!-- Right eye happy -->
  <circle class="wobbly-eye" cx="115" cy="100" r="11"/>
  <path class="wobbly-pupil" d="M 108 105 L 122 105 L 122 112 L 108 112 Z"/>
  
  <!-- Cheeks -->
  <circle class="wobbly-cheek" cx="60" cy="110" r="11"/>
  <circle class="wobbly-cheek" cx="140" cy="110" r="11"/>
  
  <!-- Big happy smile -->
  <path class="wobbly-mouth" d="M 88 130 Q 100 145 112 130"/>
  
  <!-- Left arm wobbly and raised -->
  <path class="wobbly-body" d="M 55 105 Q 35 90 30 110 Q 35 135 48 145" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <circle class="wobbly-body" cx="25" cy="105" r="9"/>
  
  <!-- Right arm wobbly and raised -->
  <path class="wobbly-body" d="M 145 105 Q 165 90 170 110 Q 165 135 152 145" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <circle class="wobbly-body" cx="175" cy="105" r="9"/>
  
  <!-- Feet -->
  <ellipse class="wobbly-body" cx="80" cy="170" rx="16" ry="12"/>
  <ellipse class="wobbly-body" cx="120" cy="170" rx="16" ry="12"/>
</svg>
