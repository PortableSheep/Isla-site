<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Zing">
  <title>Zing - Thinking</title>
  <defs>
    <style>
      .zing-body { fill: #FF4500; stroke: #DC143C; stroke-width: 2; }
      .zing-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .zing-pupil { fill: #000000; }
      .zing-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .thinking-dot { fill: #000000; }
    </style>
  </defs>
  
  <!-- Body -->
  <circle class="zing-body" cx="100" cy="110" r="50"/>
  
  <!-- Spikes calming down -->
  <polygon class="zing-body" points="100,58 105,40 95,58"/>
  <polygon class="zing-body" points="145,85 165,80 145,95"/>
  <polygon class="zing-body" points="145,135 165,140 145,150"/>
  <polygon class="zing-body" points="55,135 35,140 55,150"/>
  <polygon class="zing-body" points="55,85 35,80 55,95"/>
  
  <!-- Left eye thinking -->
  <circle class="zing-eye" cx="85" cy="100" r="11"/>
  <circle class="zing-pupil" cx="85" cy="95" r="5"/>
  
  <!-- Right eye thinking -->
  <circle class="zing-eye" cx="115" cy="100" r="11"/>
  <circle class="zing-pupil" cx="115" cy="95" r="5"/>
  
  <!-- Thinking mouth -->
  <path class="zing-mouth" d="M 95 130 Q 100 125 105 130"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="135" cy="50" r="5"/>
  <circle class="thinking-dot" cx="155" cy="65" r="3"/>
  
  <!-- Left arm thinking -->
  <ellipse class="zing-body" cx="45" cy="115" rx="13" ry="38" transform="rotate(-20 45 115)"/>
  <circle class="zing-body" cx="33" cy="145" r="9"/>
  
  <!-- Right arm -->
  <ellipse class="zing-body" cx="155" cy="115" rx="13" ry="38" transform="rotate(20 155 115)"/>
  <circle class="zing-body" cx="167" cy="145" r="9"/>
  
  <!-- Feet -->
  <ellipse class="zing-body" cx="80" cy="165" rx="16" ry="11"/>
  <ellipse class="zing-body" cx="120" cy="165" rx="16" ry="11"/>
</svg>
