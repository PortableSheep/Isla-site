<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Guardian the protective creature">
  <title>Guardian</title>
  <defs>
    <style>
      .guardian-body { fill: #32CD32; stroke: #228B22; stroke-width: 2; }
      .guardian-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .guardian-pupil { fill: #000000; }
      .guardian-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .guardian-shield { fill: #FFD700; stroke: #FFA500; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Guardian main body -->
  <circle class="guardian-body" cx="100" cy="115" r="48"/>
  
  <!-- Shield on chest -->
  <polygon class="guardian-shield" points="100,95 115,110 100,130 85,110"/>
  
  <!-- Left eye protective -->
  <circle class="guardian-eye" cx="80" cy="105" r="10"/>
  <circle class="guardian-pupil" cx="80" cy="105" r="5"/>
  
  <!-- Right eye protective -->
  <circle class="guardian-eye" cx="120" cy="105" r="10"/>
  <circle class="guardian-pupil" cx="120" cy="105" r="5"/>
  
  <!-- Noble smile -->
  <path class="guardian-mouth" d="M 90 130 Q 100 140 110 130"/>
  
  <!-- Left arm ready -->
  <ellipse class="guardian-body" cx="40" cy="120" rx="13" ry="37"/>
  <circle class="guardian-body" cx="28" cy="165" r="9"/>
  
  <!-- Right arm ready -->
  <ellipse class="guardian-body" cx="160" cy="120" rx="13" ry="37"/>
  <circle class="guardian-body" cx="172" cy="165" r="9"/>
  
  <!-- Feet firm stance -->
  <ellipse class="guardian-body" cx="78" cy="165" rx="16" ry="12"/>
  <ellipse class="guardian-body" cx="122" cy="165" rx="16" ry="12"/>
</svg>
