<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Guardian the watchful protector">
  <title>Guardian</title>
  <desc>Cloaked cyclops watcher. Palette: bone #F5F0E6 ink #1A1623 dusk #4A3A5C lavender #B8A4C9 blush #D4A5A5 lime #7EA05C</desc>
  <defs>
    <style>
      .guardian-body{fill:#1A1623;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .guardian-shadow{fill:#4A3A5C;opacity:.35}
      .guardian-hood{fill:#2A1F36}
      .guardian-eye{fill:#F5F0E6;stroke:#1A1623;stroke-width:1.5}
      .guardian-pupil{fill:#1A1623}
      .guardian-hl{fill:#F5F0E6}
      .guardian-mouth{fill:none;stroke:#1A1623;stroke-width:1.5;stroke-linecap:round}
      .guardian-accent{fill:#7EA05C;stroke:#1A1623;stroke-width:1.2}
      .guardian-stitch{fill:none;stroke:#1A1623;stroke-width:1;stroke-dasharray:3 3;opacity:.6}
