<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Cheery">
  <title>Cheery - Thinking</title>
  <defs>
    <style>
      .cheery-body { fill: #FFA500; stroke: #FF8C00; stroke-width: 2; }
      .cheery-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .cheery-pupil { fill: #000000; }
      .cheery-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .thinking-dot { fill: #000000; }
    </style>
  </defs>
  
  <!-- Main round body -->
  <circle class="cheery-body" cx="100" cy="110" r="55"/>
  
  <!-- Small ear bumps -->
  <circle class="cheery-body" cx="65" cy="65" r="15"/>
  <circle class="cheery-body" cx="135" cy="65" r="15"/>
  
  <!-- Left eye thinking up -->
  <circle class="cheery-eye" cx="85" cy="100" r="12"/>
  <circle class="cheery-pupil" cx="85" cy="95" r="5"/>
  
  <!-- Right eye thinking up -->
  <circle class="cheery-eye" cx="115" cy="100" r="12"/>
  <circle class="cheery-pupil" cx="115" cy="95" r="5"/>
  
  <!-- Thinking mouth -->
  <path class="cheery-mouth" d="M 95 135 Q 100 130 105 135"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="130" cy="50" r="5"/>
  <circle class="thinking-dot" cx="150" cy="65" r="3"/>
  
  <!-- Dots -->
  <circle fill="#FFD700" cx="75" cy="95" r="3"/>
  <circle fill="#FFD700" cx="100" cy="155" r="3"/>
  
  <!-- Left arm down -->
  <ellipse class="cheery-body" cx="45" cy="120" rx="13" ry="40"/>
  <circle class="cheery-body" cx="35" cy="165" r="8"/>
  
  <!-- Right arm -->
  <ellipse class="cheery-body" cx="155" cy="120" rx="13" ry="40"/>
  <circle class="cheery-body" cx="165" cy="165" r="8"/>
  
  <!-- Feet -->
  <ellipse class="cheery-body" cx="80" cy="170" rx="18" ry="10"/>
  <ellipse class="cheery-body" cx="120" cy="170" rx="18" ry="10"/>
</svg>
