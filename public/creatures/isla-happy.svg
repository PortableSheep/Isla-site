<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Isla">
  <title>Isla - Happy</title>
  <defs>
    <style>
      .isla-body { fill: #FF6B9D; stroke: #C2185B; stroke-width: 2; }
      .isla-eye { fill: #2C3E50; }
      .isla-shine { fill: #FFFFFF; }
      .isla-mouth { fill: none; stroke: #8B4513; stroke-width: 2.5; }
      .isla-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Round head -->
  <circle class="isla-body" cx="100" cy="90" r="50"/>
  
  <!-- Crown-like pointed ears -->
  <polygon class="isla-body" points="70,50 60,15 75,45"/>
  <polygon class="isla-body" points="130,50 140,15 125,45"/>
  
  <!-- Left eye happy -->
  <circle class="isla-eye" cx="85" cy="85" r="10"/>
  <path class="isla-eye" d="M 78 92 Q 85 97 92 92"/>
  <circle class="isla-shine" cx="86" cy="82" r="4"/>
  
  <!-- Right eye happy -->
  <circle class="isla-eye" cx="115" cy="85" r="10"/>
  <path class="isla-eye" d="M 108 92 Q 115 97 122 92"/>
  <circle class="isla-shine" cx="116" cy="82" r="4"/>
  
  <!-- Cheeks -->
  <circle class="isla-cheek" cx="60" cy="95" r="10"/>
  <circle class="isla-cheek" cx="140" cy="95" r="10"/>
  
  <!-- Big smile -->
  <path class="isla-mouth" d="M 88 108 Q 100 120 112 108"/>
  
  <!-- Body/dress -->
  <ellipse class="isla-body" cx="100" cy="145" rx="35" ry="45"/>
  
  <!-- Left arm raised -->
  <ellipse class="isla-body" cx="50" cy="110" rx="12" ry="38" transform="rotate(-30 50 110)"/>
  <circle class="isla-body" cx="35" cy="95" r="8"/>
  
  <!-- Right arm raised -->
  <ellipse class="isla-body" cx="150" cy="110" rx="12" ry="38" transform="rotate(30 150 110)"/>
  <circle class="isla-body" cx="165" cy="95" r="8"/>
  
  <!-- Feet -->
  <ellipse class="isla-body" cx="80" cy="190" rx="12" ry="8"/>
  <ellipse class="isla-body" cx="120" cy="190" rx="12" ry="8"/>
</svg>
