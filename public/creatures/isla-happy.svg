<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Isla the rag-doll boss, happy">
  <title>Isla (happy)</title>
  <defs>
    <style>
      .isla-body{fill:#4A3A5C;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .head{fill:#F5F0E6;stroke:#1A1623;stroke-width:2.5;stroke-linejoin:round}
      .isla-eye{fill:none;stroke:#1A1623;stroke-width:2.5;stroke-linecap:round}
      .isla-mouth{fill:#1A1623;stroke:#1A1623;stroke-width:1.2;stroke-linejoin:round}
      .isla-accent{fill:#B34A5E;stroke:#1A1623;stroke-width:1.5;stroke-linejoin:round}
      .shadow{fill:#4A3A5C;opacity:.35}
      .thin{fill:none;stroke:#1A1623;stroke-width:1;stroke-linecap:round}
      .seam{fill:none;stroke:#1A1623;stroke-width:1.1;stroke-dasharray:2.5 2.5;stroke-linecap:round}
      .patch1{fill:#D4A5A5;stroke:#1A1623;stroke-width:1.1;stroke-dasharray:2.3 2.3;stroke-linejoin:round}
      .patch2{fill:#B8A4C9;stroke:#1A1623;stroke-width:1.1;stroke-dasharray:2.3 2.3;stroke-linejoin:round}
    </style>
  </defs>
  <path class="shadow" d="M82 102 Q68 150 76 184 L130 184 Q136 150 124 102 Z"/>
  <path class="isla-body" d="M80 100 Q66 150 74 182 L126 182 Q134 150 120 100 Z"/>
  <path class="thin" d="M76 176 Q82 182 88 176 Q94 182 100 176 Q106 182 112 176 Q118 182 124 176"/>
  <path class="patch1" d="M84 118 L96 116 L94 131 L82 132 Z"/>
  <path class="patch2" d="M108 148 L122 146 L120 162 L106 161 Z"/>
  <path class="thin" stroke-width="1.5" d="M82 104 Q70 134 76 160"/>
  <path class="thin" stroke-width="1.5" d="M118 104 Q130 134 124 160"/>
  <circle cx="76" cy="162" r="2.4" fill="#F5F0E6" stroke="#1A1623" stroke-width="1"/>
  <circle cx="124" cy="162" r="2.4" fill="#F5F0E6" stroke="#1A1623" stroke-width="1"/>
  <path class="isla-body" d="M94 98 L106 98 L105 78 L95 78 Z"/>
  <path class="seam" d="M94 82 L106 82"/>
  <g transform="rotate(-6 100 58)">
    <path class="head" d="M82 54 Q80 34 100 32 Q122 34 118 56 Q116 76 100 78 Q84 76 82 54 Z"/>
    <path class="thin" opacity=".35" d="M86 54 Q86 38 100 38 Q116 40 114 56"/>
    <!-- crescent eyes -->
    <path class="isla-eye" d="M85 56 Q91 48 97 56"/>
    <path class="isla-eye" d="M103 56 Q109 48 115 56"/>
    <!-- open grin with tooth -->
    <path class="isla-mouth" d="M93 66 Q100 76 107 66 Q100 70 93 66 Z"/>
    <path d="M98 66 L102 66 L100 70 Z" fill="#F5F0E6" stroke="#1A1623" stroke-width="0.8"/>
    <circle cx="84" cy="62" r="2.7" fill="#D4A5A5" opacity=".7"/>
    <circle cx="116" cy="62" r="2.7" fill="#D4A5A5" opacity=".7"/>
  </g>
  <g transform="rotate(-8 100 30)">
    <path class="isla-accent" d="M84 38 L90 20 L97 34 L100 16 L103 34 L110 20 L116 38 Z"/>
    <path class="thin" d="M90 34 L110 34" opacity=".6"/>
  </g>
</svg>
