<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Brain">
  <title>Brain - Thinking</title>
  <defs>
    <style>
      .brain-body { fill: #E6B3FF; stroke: #8B00FF; stroke-width: 2; }
      .brain-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .brain-pupil { fill: #000000; }
      .brain-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .brain-wrinkle { fill: none; stroke: #8B00FF; stroke-width: 1.5; }
      .thinking-dot { fill: #8B00FF; }
    </style>
  </defs>
  
  <!-- Body -->
  <circle class="brain-body" cx="100" cy="115" r="48"/>
  
  <!-- Brain wrinkles more prominent -->
  <path class="brain-wrinkle" d="M 80 100 Q 85 95 90 100"/>
  <path class="brain-wrinkle" d="M 85 110 Q 90 105 95 110"/>
  <path class="brain-wrinkle" d="M 110 100 Q 115 95 120 100"/>
  <path class="brain-wrinkle" d="M 105 110 Q 110 105 115 110"/>
  <path class="brain-wrinkle" d="M 90 130 Q 95 125 100 130"/>
  <path class="brain-wrinkle" d="M 100 135 Q 105 130 110 135"/>
  
  <!-- Left eye thinking -->
  <circle class="brain-eye" cx="85" cy="105" r="10"/>
  <circle class="brain-pupil" cx="85" cy="100" r="5"/>
  
  <!-- Right eye thinking -->
  <circle class="brain-eye" cx="115" cy="105" r="10"/>
  <circle class="brain-pupil" cx="115" cy="100" r="5"/>
  
  <!-- Thinking mouth -->
  <path class="brain-mouth" d="M 95 130 Q 100 125 105 130"/>
  
  <!-- Many thought bubbles -->
  <circle class="thinking-dot" cx="135" cy="55" r="5"/>
  <circle class="thinking-dot" cx="155" cy="70" r="4"/>
  <circle class="thinking-dot" cx="160" cy="90" r="3"/>
  
  <!-- Left arm down -->
  <ellipse class="brain-body" cx="45" cy="120" rx="12" ry="35"/>
  <circle class="brain-body" cx="38" cy="155" r="8"/>
  
  <!-- Right arm -->
  <ellipse class="brain-body" cx="155" cy="120" rx="12" ry="35"/>
  <circle class="brain-body" cx="162" cy="155" r="8"/>
  
  <!-- Feet -->
  <ellipse class="brain-body" cx="80" cy="165" rx="15" ry="11"/>
  <ellipse class="brain-body" cx="120" cy="165" rx="15" ry="11"/>
</svg>
