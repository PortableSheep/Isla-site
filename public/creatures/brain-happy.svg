<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Brain">
  <title>Brain - Happy</title>
  <defs>
    <style>
      .brain-body { fill: #E6B3FF; stroke: #8B00FF; stroke-width: 2; }
      .brain-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .brain-pupil { fill: #000000; }
      .brain-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .brain-wrinkle { fill: none; stroke: #8B00FF; stroke-width: 1.5; }
      .brain-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Body -->
  <circle class="brain-body" cx="100" cy="110" r="48"/>
  
  <!-- Brain wrinkles -->
  <path class="brain-wrinkle" d="M 80 95 Q 85 90 90 95"/>
  <path class="brain-wrinkle" d="M 85 105 Q 90 100 95 105"/>
  <path class="brain-wrinkle" d="M 110 95 Q 115 90 120 95"/>
  <path class="brain-wrinkle" d="M 105 105 Q 110 100 115 105"/>
  <path class="brain-wrinkle" d="M 90 125 Q 95 120 100 125"/>
  <path class="brain-wrinkle" d="M 100 130 Q 105 125 110 130"/>
  
  <!-- Left eye happy -->
  <circle class="brain-eye" cx="85" cy="100" r="10"/>
  <path class="brain-pupil" d="M 78 104 L 92 104 L 92 110 L 78 110 Z"/>
  
  <!-- Right eye happy -->
  <circle class="brain-eye" cx="115" cy="100" r="10"/>
  <path class="brain-pupil" d="M 108 104 L 122 104 L 122 110 L 108 110 Z"/>
  
  <!-- Cheeks -->
  <circle class="brain-cheek" cx="60" cy="105" r="10"/>
  <circle class="brain-cheek" cx="140" cy="105" r="10"/>
  
  <!-- Happy smile -->
  <path class="brain-mouth" d="M 88 125 Q 100 140 112 125"/>
  
  <!-- Left arm raised -->
  <ellipse class="brain-body" cx="40" cy="95" rx="12" ry="35" transform="rotate(-30 40 95)"/>
  <circle class="brain-body" cx="25" cy="80" r="8"/>
  
  <!-- Right arm raised -->
  <ellipse class="brain-body" cx="160" cy="95" rx="12" ry="35" transform="rotate(30 160 95)"/>
  <circle class="brain-body" cx="175" cy="80" r="8"/>
  
  <!-- Feet -->
  <ellipse class="brain-body" cx="80" cy="160" rx="15" ry="11"/>
  <ellipse class="brain-body" cx="120" cy="160" rx="15" ry="11"/>
</svg>
