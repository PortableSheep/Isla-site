<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Echo">
  <title>Echo - Happy</title>
  <defs>
    <style>
      .echo-body { fill: #FF00FF; stroke: #C71585; stroke-width: 2; }
      .echo-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .echo-pupil { fill: #000000; }
      .echo-mouth { fill: none; stroke: #000000; stroke-width: 2.5; }
      .echo-ring { fill: none; stroke: #FFB6FF; stroke-width: 2; opacity: 0.7; }
      .echo-cheek { fill: #FFB6C1; opacity: 0.6; }
    </style>
  </defs>
  
  <!-- Main body -->
  <circle class="echo-body" cx="100" cy="110" r="48"/>
  
  <!-- Echo rings amplified -->
  <circle class="echo-ring" cx="100" cy="110" r="55"/>
  <circle class="echo-ring" cx="100" cy="110" r="70"/>
  
  <!-- Left eye happy -->
  <circle class="echo-eye" cx="85" cy="100" r="10"/>
  <path class="echo-pupil" d="M 78 104 L 92 104 L 92 110 L 78 110 Z"/>
  
  <!-- Right eye happy -->
  <circle class="echo-eye" cx="115" cy="100" r="10"/>
  <path class="echo-pupil" d="M 108 104 L 122 104 L 122 110 L 108 110 Z"/>
  
  <!-- Cheeks -->
  <circle class="echo-cheek" cx="60" cy="105" r="10"/>
  <circle class="echo-cheek" cx="140" cy="105" r="10"/>
  
  <!-- Big joyful smile -->
  <path class="echo-mouth" d="M 88 125 Q 100 140 112 125"/>
  
  <!-- Left arm singing -->
  <ellipse class="echo-body" cx="35" cy="95" rx="12" ry="36" transform="rotate(-30 35 95)"/>
  <circle class="echo-body" cx="20" cy="80" r="8"/>
  
  <!-- Right arm singing -->
  <ellipse class="echo-body" cx="165" cy="95" rx="12" ry="36" transform="rotate(30 165 95)"/>
  <circle class="echo-body" cx="180" cy="80" r="8"/>
  
  <!-- Feet -->
  <ellipse class="echo-body" cx="80" cy="160" rx="15" ry="11"/>
  <ellipse class="echo-body" cx="120" cy="160" rx="15" ry="11"/>
</svg>
