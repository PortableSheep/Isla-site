<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Wave">
  <title>Wave - Thinking</title>
  <defs>
    <style>
      .wave-body { fill: #1E90FF; stroke: #0047AB; stroke-width: 2; }
      .wave-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .wave-pupil { fill: #000000; }
      .wave-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .wave-ripple { fill: none; stroke: #00CED1; stroke-width: 2; }
      .thinking-dot { fill: #0047AB; }
    </style>
  </defs>
  
  <!-- Wave body -->
  <circle class="wave-body" cx="100" cy="115" r="48"/>
  
  <!-- Wavy pattern -->
  <path class="wave-ripple" d="M 65 110 Q 70 105 75 110 Q 80 115 85 110"/>
  <path class="wave-ripple" d="M 85 130 Q 90 125 95 130 Q 100 135 105 130 Q 110 125 115 130"/>
  <path class="wave-ripple" d="M 115 110 Q 120 105 125 110 Q 130 115 135 110"/>
  
  <!-- Left eye thinking -->
  <circle class="wave-eye" cx="85" cy="105" r="10"/>
  <circle class="wave-pupil" cx="85" cy="100" r="5"/>
  
  <!-- Right eye thinking -->
  <circle class="wave-eye" cx="115" cy="105" r="10"/>
  <circle class="wave-pupil" cx="115" cy="100" r="5"/>
  
  <!-- Thinking mouth -->
  <path class="wave-mouth" d="M 95 135 Q 100 130 105 135"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="135" cy="55" r="5"/>
  <circle class="thinking-dot" cx="155" cy="70" r="3"/>
  
  <!-- Left arm -->
  <ellipse class="wave-body" cx="40" cy="115" rx="12" ry="36" transform="rotate(-25 40 115)"/>
  <circle class="wave-body" cx="28" cy="140" r="9"/>
  
  <!-- Right arm -->
  <ellipse class="wave-body" cx="160" cy="125" rx="12" ry="36"/>
  <circle class="wave-body" cx="170" cy="170" r="9"/>
  
  <!-- Feet -->
  <ellipse class="wave-body" cx="80" cy="165" rx="15" ry="11"/>
  <ellipse class="wave-body" cx="120" cy="165" rx="15" ry="11"/>
</svg>
