<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pixel the geometric creature">
  <title>Pixel</title>
  <defs>
    <style>
      .pixel-body { fill: #00CED1; stroke: #008B8B; stroke-width: 2; }
      .pixel-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .pixel-pupil { fill: #000000; }
      .pixel-mouth { fill: none; stroke: #000000; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Cubic body -->
  <rect class="pixel-body" x="60" y="70" width="80" height="80" rx="4"/>
  
  <!-- Left eye square -->
  <rect class="pixel-eye" x="70" y="85" width="20" height="20" rx="2"/>
  <rect class="pixel-pupil" x="76" y="90" width="8" height="8"/>
  
  <!-- Right eye square -->
  <rect class="pixel-eye" x="110" y="85" width="20" height="20" rx="2"/>
  <rect class="pixel-pupil" x="116" y="90" width="8" height="8"/>
  
  <!-- Antenna left -->
  <line x1="75" y1="70" x2="75" y2="40" stroke="#008B8B" stroke-width="3" stroke-linecap="round"/>
  <circle fill="#00CED1" cx="75" cy="35" r="5"/>
  
  <!-- Antenna right -->
  <line x1="125" y1="70" x2="125" y2="40" stroke="#008B8B" stroke-width="3" stroke-linecap="round"/>
  <circle fill="#00CED1" cx="125" cy="35" r="5"/>
  
  <!-- Smile mouth -->
  <path class="pixel-mouth" d="M 80 125 L 100 135 L 120 125"/>
  
  <!-- Left arm -->
  <rect class="pixel-body" x="45" y="105" width="15" height="50" rx="2"/>
  <circle fill="#00CED1" cx="52" cy="160" r="8"/>
  
  <!-- Right arm -->
  <rect class="pixel-body" x="140" y="105" width="15" height="50" rx="2"/>
  <circle fill="#00CED1" cx="147" cy="160" r="8"/>
  
  <!-- Left foot -->
  <rect class="pixel-body" x="65" y="155" width="20" height="25" rx="2"/>
  
  <!-- Right foot -->
  <rect class="pixel-body" x="115" y="155" width="20" height="25" rx="2"/>
</svg>
