<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Happy Pixel">
  <title>Pixel - Happy</title>
  <defs>
    <style>
      .pixel-body { fill: #00CED1; stroke: #008B8B; stroke-width: 2; }
      .pixel-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .pixel-pupil { fill: #000000; }
      .pixel-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .pixel-cheek { fill: #FFB6C1; opacity: 0.5; }
    </style>
  </defs>
  
  <!-- Cubic body -->
  <rect class="pixel-body" x="60" y="70" width="80" height="80" rx="4"/>
  
  <!-- Left eye happy -->
  <rect class="pixel-eye" x="70" y="85" width="20" height="20" rx="2"/>
  <path class="pixel-pupil" d="M 76 90 L 84 90 L 84 98 L 76 98 Z"/>
  <path fill="#FFFFFF" d="M 78 92 L 82 92 L 82 96 L 78 96 Z"/>
  
  <!-- Right eye happy -->
  <rect class="pixel-eye" x="110" y="85" width="20" height="20" rx="2"/>
  <path class="pixel-pupil" d="M 116 90 L 124 90 L 124 98 L 116 98 Z"/>
  <path fill="#FFFFFF" d="M 118 92 L 122 92 L 122 96 L 118 96 Z"/>
  
  <!-- Cheeks -->
  <circle class="pixel-cheek" cx="55" cy="115" r="12"/>
  <circle class="pixel-cheek" cx="145" cy="115" r="12"/>
  
  <!-- Antenna left -->
  <line x1="75" y1="70" x2="75" y2="35" stroke="#008B8B" stroke-width="3" stroke-linecap="round"/>
  <circle fill="#00CED1" cx="75" cy="30" r="5"/>
  
  <!-- Antenna right -->
  <line x1="125" y1="70" x2="125" y2="35" stroke="#008B8B" stroke-width="3" stroke-linecap="round"/>
  <circle fill="#00CED1" cx="125" cy="30" r="5"/>
  
  <!-- Big happy mouth -->
  <path class="pixel-mouth" d="M 75 125 L 100 140 L 125 125"/>
  
  <!-- Left arm raised -->
  <rect class="pixel-body" x="45" y="90" width="15" height="50" rx="2" transform="rotate(-25 52 90)"/>
  <circle fill="#00CED1" cx="42" cy="80" r="8"/>
  
  <!-- Right arm raised -->
  <rect class="pixel-body" x="140" y="90" width="15" height="50" rx="2" transform="rotate(25 147 90)"/>
  <circle fill="#00CED1" cx="158" cy="80" r="8"/>
  
  <!-- Left foot -->
  <rect class="pixel-body" x="65" y="155" width="20" height="25" rx="2"/>
  
  <!-- Right foot -->
  <rect class="pixel-body" x="115" y="155" width="20" height="25" rx="2"/>
</svg>
