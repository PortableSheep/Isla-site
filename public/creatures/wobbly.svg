<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wobbly the jiggly creature">
  <title>Wobbly</title>
  <defs>
    <style>
      .wobbly-body { fill: #9B59B6; stroke: #6C3483; stroke-width: 2; }
      .wobbly-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .wobbly-pupil { fill: #000000; }
      .wobbly-mouth { fill: none; stroke: #000000; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Wobbly main body (egg-like) -->
  <ellipse class="wobbly-body" cx="100" cy="115" rx="48" ry="60"/>
  
  <!-- Wobbly bumps/wobbles -->
  <circle class="wobbly-body" cx="70" cy="75" r="12"/>
  <circle class="wobbly-body" cx="130" cy="75" r="12"/>
  <circle class="wobbly-body" cx="60" cy="140" r="10"/>
  <circle class="wobbly-body" cx="140" cy="145" r="10"/>
  
  <!-- Left eye -->
  <circle class="wobbly-eye" cx="85" cy="105" r="11"/>
  <circle class="wobbly-pupil" cx="85" cy="107" r="6"/>
  
  <!-- Right eye -->
  <circle class="wobbly-eye" cx="115" cy="105" r="11"/>
  <circle class="wobbly-pupil" cx="115" cy="107" r="6"/>
  
  <!-- Friendly smile -->
  <path class="wobbly-mouth" d="M 90 130 Q 100 142 110 130"/>
  
  <!-- Left arm wobbly -->
  <path class="wobbly-body" d="M 55 115 Q 40 110 35 130 Q 38 150 50 155" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <circle class="wobbly-body" cx="30" cy="140" r="9"/>
  
  <!-- Right arm wobbly -->
  <path class="wobbly-body" d="M 145 115 Q 160 110 165 130 Q 162 150 150 155" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <circle class="wobbly-body" cx="170" cy="140" r="9"/>
  
  <!-- Feet -->
  <ellipse class="wobbly-body" cx="80" cy="175" rx="16" ry="12"/>
  <ellipse class="wobbly-body" cx="120" cy="175" rx="16" ry="12"/>
</svg>
