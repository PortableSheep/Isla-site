<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Glimmer">
  <title>Glimmer - Thinking</title>
  <defs>
    <style>
      .glimmer-body { fill: #FFD700; stroke: #DAA520; stroke-width: 2; }
      .glimmer-eye { fill: #2C3E50; }
      .glimmer-eye-shine { fill: #FFFFFF; }
      .glimmer-mouth { fill: none; stroke: #8B4513; stroke-width: 2; }
      .thinking-dot { fill: #8B4513; }
    </style>
  </defs>
  
  <!-- Main body -->
  <ellipse class="glimmer-body" cx="100" cy="110" rx="55" ry="65"/>
  
  <!-- Left ear -->
  <ellipse class="glimmer-body" cx="70" cy="55" rx="18" ry="32"/>
  <ellipse class="glimmer-eye" cx="70" cy="50" rx="8" ry="10"/>
  
  <!-- Right ear -->
  <ellipse class="glimmer-body" cx="130" cy="55" rx="18" ry="32"/>
  <ellipse class="glimmer-eye" cx="130" cy="50" rx="8" ry="10"/>
  
  <!-- Left eye looking up in thought -->
  <circle class="glimmer-eye" cx="80" cy="92" r="12"/>
  <circle class="glimmer-eye-shine" cx="80" cy="85" r="5"/>
  
  <!-- Right eye looking up in thought -->
  <circle class="glimmer-eye" cx="120" cy="92" r="12"/>
  <circle class="glimmer-eye-shine" cx="120" cy="85" r="5"/>
  
  <!-- Hand on chin -->
  <circle class="glimmer-body" cx="65" cy="135" r="10"/>
  
  <!-- Sparkle spots -->
  <circle fill="#FFE4B5" cx="75" cy="115" r="4"/>
  <circle fill="#FFE4B5" cx="125" cy="120" r="4"/>
  
  <!-- Thinking mouth - slight frown -->
  <path class="glimmer-mouth" d="M 95 140 Q 100 135 105 140"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="130" cy="45" r="4"/>
  <circle class="thinking-dot" cx="145" cy="55" r="3"/>
  <circle class="thinking-dot" cx="155" cy="70" r="2"/>
  
  <!-- Left arm down -->
  <ellipse class="glimmer-body" cx="50" cy="130" rx="12" ry="35"/>
  
  <!-- Right arm -->
  <ellipse class="glimmer-body" cx="145" cy="120" rx="12" ry="35"/>
  
  <!-- Feet -->
  <ellipse class="glimmer-body" cx="85" cy="175" rx="15" ry="12"/>
  <ellipse class="glimmer-body" cx="115" cy="175" rx="15" ry="12"/>
</svg>
