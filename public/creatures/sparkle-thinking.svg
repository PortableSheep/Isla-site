<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thinking Sparkle">
  <title>Sparkle - Thinking</title>
  <defs>
    <style>
      .sparkle-body { fill: #FF69B4; stroke: #FF1493; stroke-width: 2; }
      .sparkle-eye { fill: #FFFFFF; stroke: #000000; stroke-width: 1.5; }
      .sparkle-pupil { fill: #000000; }
      .sparkle-mouth { fill: none; stroke: #000000; stroke-width: 2; }
      .star-shine { fill: #FFD700; }
      .thinking-dot { fill: #000000; }
    </style>
  </defs>
  
  <!-- Star-shaped body -->
  <polygon class="sparkle-body" points="100,30 115,80 170,80 125,120 145,170 100,130 55,170 75,120 30,80 85,80"/>
  
  <!-- Left eye thinking (looking up) -->
  <circle class="sparkle-eye" cx="80" cy="75" r="10"/>
  <circle class="sparkle-pupil" cx="80" cy="72" r="5"/>
  
  <!-- Right eye thinking (looking up) -->
  <circle class="sparkle-eye" cx="120" cy="75" r="10"/>
  <circle class="sparkle-pupil" cx="120" cy="72" r="5"/>
  
  <!-- Thinking mouth -->
  <path class="sparkle-mouth" d="M 95 110 Q 100 105 105 110"/>
  
  <!-- Sparkles -->
  <polygon class="star-shine" points="150,45 153,53 161,53 154,60 157,68 150,60 143,68 146,60 139,53 147,53"/>
  <polygon class="star-shine" points="50,55 52,62 60,62 53,67 55,75 50,70 45,75 47,67 40,62 48,62"/>
  
  <!-- Thought bubbles -->
  <circle class="thinking-dot" cx="140" cy="50" r="5"/>
  <circle class="thinking-dot" cx="160" cy="65" r="3"/>
  
  <!-- Arm left scratching -->
  <ellipse class="sparkle-body" cx="40" cy="90" rx="12" ry="40"/>
  
  <!-- Arm right thinking -->
  <ellipse class="sparkle-body" cx="155" cy="100" rx="12" ry="40"/>
</svg>
